<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>انبار سینا</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Vazirmatn', Tahoma, sans-serif; direction: rtl; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #0f172a); border-bottom: 1px solid #334155; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-title { font-weight: 700; font-size: 16px; color: #f1f5f9; }
.header-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.tab-btn { background: transparent; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Vazirmatn', Tahoma, sans-serif; }
.tab-btn.active { background: #3b82f6; border-color: #3b82f6; }
.container { padding: 16px; max-width: 600px; margin: 0 auto; }
.voice-card { background: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
.mic-wrap { text-align: center; margin-bottom: 16px; }
.mic-btn { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: none; cursor: pointer; font-size: 32px; box-shadow: 0 4px 20px rgba(59,130,246,0.4); transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; }
.mic-btn.listening { background: linear-gradient(135deg, #dc2626, #b91c1c); animation: pulse 1s infinite; }
.mic-btn:disabled { opacity: 0.6; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 8px rgba(220,38,38,0.2); } 50% { box-shadow: 0 0 0 16px rgba(220,38,38,0.05); } }
.mic-label { margin-top: 10px; font-size: 13px; color: #94a3b8; }
.result-box { background: #0f172a; border-radius: 10px; padding: 10px 14px; margin-top: 10px; font-size: 13px; border: 1px solid #334155; display: none; white-space: pre-line; }
.result-box.show { display: block; }
.result-box.success { color: #86efac; border-color: #166534; }
.result-box.error { color: #fca5a5; border-color: #7f1d1d; }
.transcript { color: #94a3b8; font-size: 11px; margin-bottom: 4px; }
.manual-row { margin-top: 14px; display: flex; gap: 8px; }
.manual-input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; direction: rtl; outline: none; font-family: 'Vazirmatn', Tahoma, sans-serif; }
.manual-input:focus { border-color: #3b82f6; }
.submit-btn { background: #3b82f6; border: none; border-radius: 10px; padding: 10px 16px; color: #fff; cursor: pointer; font-size: 13px; font-family: 'Vazirmatn', Tahoma, sans-serif; }
.submit-btn:disabled { opacity: 0.5; }
.search-input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; direction: rtl; outline: none; margin-bottom: 12px; font-family: 'Vazirmatn', Tahoma, sans-serif; }
.cats { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; }
.cat-btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: 'Vazirmatn', Tahoma, sans-serif; }
.cat-btn.active { background: #3b82f6; border-color: #3b82f6; }
.empty { text-align: center; padding: 40px; color: #475569; background: #1e293b; border-radius: 16px; border: 1px dashed #334155; }
.product-card { background: #1e293b; border-radius: 14px; padding: 14px 16px; border: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.product-card.low { border-color: rgba(245,158,11,0.3); }
.product-name { font-weight: 600; font-size: 14px; color: #f1f5f9; }
.product-model { color: #94a3b8; font-weight: 400; }
.product-cat { font-size: 11px; color: #64748b; background: #0f172a; display: inline-block; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
.qty-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.qty-btn { background: #334155; border: none; border-radius: 8px; width: 30px; height: 30px; color: #e2e8f0; cursor: pointer; font-size: 16px; }
.qty-num { font-size: 18px; font-weight: 700; min-width: 32px; text-align: center; color: #86efac; }
.qty-num.low { color: #f87171; }
.del-btn { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card { background: #1e293b; border-radius: 16px; padding: 16px; }
.stat-val { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-label { font-size: 12px; color: #64748b; }
.low-list { grid-column: 1/-1; background: #1e293b; border-radius: 16px; padding: 16px; border: 1px solid rgba(245,158,11,0.2); }
.low-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #334155; font-size: 13px; }
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #16a34a; color: #fff; padding: 10px 20px; border-radius: 12px; z-index: 999; font-size: 13px; max-width: 90vw; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; font-family: 'Vazirmatn', Tahoma, sans-serif; }
.toast.error { background: #dc2626; }
.toast.show { display: block; }
.hint { background: #1e293b; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #334155; font-size: 12px; color: #64748b; line-height: 1.8; }
.hint span { color: #86efac; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:22px">📦</span>
    <div>
      <div class="header-title">انبار سینا</div>
      <div class="header-sub" id="headerStats">۰ آیتم در ۰ محصول</div>
    </div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="tab-btn active" onclick="switchView('inventory')">انبار</button>
    <button class="tab-btn" onclick="switchView('dashboard')">داشبورد</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="container">
  <div class="voice-card">
    <div class="mic-wrap">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
      <div class="mic-label" id="micLabel">ضربه بزن و حرف بزن</div>
    </div>
    <div class="result-box" id="resultBox">
      <div class="transcript" id="transcriptEl"></div>
      <div id="resultMsg"></div>
    </div>
    <div class="manual-row">
      <input class="manual-input" id="manualInput" placeholder="یا اینجا تایپ کن..." onkeydown="if(event.key==='Enter')submitManual()">
      <button class="submit-btn" id="submitBtn" onclick="submitManual()">ثبت</button>
    </div>
  </div>

  <div class="hint">
    🎤 <strong>نمونه دستورات:</strong><br>
    <span>چهار تا ساعت سامسونگ اضافه کن</span><br>
    <span>دو تا هندزفری JBL کم کن</span><br>
    <span>موجودی ساعت سامسونگ چقدره</span>
  </div>

  <div id="viewInventory">
    <input class="search-input" id="searchInput" placeholder="🔍 جستجو..." oninput="renderProducts()">
    <div class="cats" id="catsBar"></div>
    <div id="productList"></div>
  </div>

  <div id="viewDashboard" style="display:none">
    <div class="dashboard" id="dashContent"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://anbar-api.sfarnam73.workers.dev';
const STORAGE_KEY = 'sina-anbar-v3';
let products = [];
let currentCat = 'همه';
let recognition = null;
let isListening = false;
let isLoading = false;

try { const s = localStorage.getItem(STORAGE_KEY); if(s) products = JSON.parse(s); } catch(e){}

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); } catch(e){} }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type==='error' ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function switchView(v) {
  document.getElementById('viewInventory').style.display = v==='inventory' ? 'block' : 'none';
  document.getElementById('viewDashboard').style.display = v==='dashboard' ? 'block' : 'none';
  if(v==='dashboard') renderDashboard();
}

function setLoading(on) {
  isLoading = on;
  const btn = document.getElementById('micBtn');
  const sub = document.getElementById('submitBtn');
  btn.disabled = on;
  sub.disabled = on;
  if(on) { btn.textContent = '⏳'; document.getElementById('micLabel').textContent = 'در حال پردازش...'; }
  else if(!isListening) { btn.textContent = '🎤'; document.getElementById('micLabel').textContent = 'ضربه بزن و حرف بزن'; }
}

async function processText(text) {
  if(!text.trim() || isLoading) return;
  setLoading(true);

  document.getElementById('transcriptEl').textContent = 'گفتی: ' + text;
  const box = document.getElementById('resultBox');
  const msgEl = document.getElementById('resultMsg');
  box.className = 'result-box show';
  msgEl.textContent = '⏳ در حال پردازش...';

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text, inventory: products })
    });

    const data = await res.json();
    if(data.error) throw new Error(data.error);

    let action;
    try { action = JSON.parse(data.result); }
    catch(e) { throw new Error('پاسخ نامعتبر از AI'); }

    const { msg, success } = applyAction(action);
    msgEl.textContent = msg;
    box.className = 'result-box show ' + (success ? 'success' : 'error');
    showToast(msg.split('\n')[0], success ? 'success' : 'error');
    save();
    renderProducts();

  } catch(e) {
    msgEl.textContent = '❌ ' + (e.message || 'خطا در اتصال');
    box.className = 'result-box show error';
    showToast('خطا در اتصال', 'error');
  }

  setLoading(false);
}

function applyAction(action) {
  let msg = '';
  let success = true;

  if(action.type === 'list') {
    msg = products.length > 0 ? '📋 ' + products.length + ' محصول در انبار' : '📋 انبار خالیه';
  }
  else if(action.type === 'query') {
    const found = products.filter(p => p.name.includes(action.product) || action.product.includes(p.name));
    msg = found.length > 0 ? found.map(p => '📦 ' + p.name + ' ' + (p.model||'') + ': ' + p.qty + ' عدد').join('\n') : '⚠️ پیدا نشد';
  }
  else if(action.type === 'add' || action.type === 'set') {
    const idx = products.findIndex(p => p.name.includes(action.product) || action.product.includes(p.name));
    if(idx >= 0) {
      const prev = products[idx].qty;
      products[idx].qty = action.type === 'set' ? action.qty : products[idx].qty + action.qty;
      msg = '✅ ' + products[idx].name + ': ' + prev + ' → ' + products[idx].qty + ' عدد';
    } else {
      products.push({ id: Date.now(), name: action.product, model: action.model||'', category: action.category||'متفرقه', qty: action.qty });
      msg = '✅ اضافه شد: ' + action.product + ' — ' + action.qty + ' عدد';
    }
  }
  else if(action.type === 'remove') {
    const idx = products.findIndex(p => p.name.includes(action.product) || action.product.includes(p.name));
    if(idx >= 0) {
      const prev = products[idx].qty;
      products[idx].qty = Math.max(0, products[idx].qty - action.qty);
      msg = '✅ ' + products[idx].name + ': ' + prev + ' → ' + products[idx].qty + ' عدد';
    } else {
      msg = '⚠️ محصول پیدا نشد';
      success = false;
    }
  }
  return { msg, success };
}

function submitManual() {
  const inp = document.getElementById('manualInput');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  processText(text);
}

function toggleMic() {
  if(isLoading) return;
  if(isListening) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { showToast('از Chrome استفاده کن', 'error'); return; }

  recognition = new SR();
  recognition.lang = 'fa-IR';
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').className = 'mic-btn listening';
    document.getElementById('micBtn').textContent = '⏹️';
    document.getElementById('micLabel').textContent = 'گوش می‌دم...';
  };
  recognition.onend = () => {
    isListening = false;
    if(!isLoading) {
      document.getElementById('micBtn').className = 'mic-btn';
      document.getElementById('micBtn').textContent = '🎤';
      document.getElementById('micLabel').textContent = 'ضربه بزن و حرف بزن';
    }
  };
  recognition.onerror = () => { isListening = false; };
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    if(e.results[e.results.length-1].isFinal) processText(t);
    else document.getElementById('transcriptEl').textContent = 'می‌گه: ' + t;
  };
  recognition.start();
}

function getCategories() { return ['همه', ...new Set(products.map(p => p.category).filter(Boolean))]; }

function updateStats() {
  const total = products.reduce((s,p) => s+p.qty, 0);
  document.getElementById('headerStats').textContent = total + ' آیتم در ' + products.length + ' محصول';
}

function renderCats() {
  document.getElementById('catsBar').innerHTML = getCategories().map(c =>
    '<button class="cat-btn' + (c===currentCat?' active':'') + '" onclick="currentCat=\'' + c + '\';renderProducts()">' + c + '</button>'
  ).join('');
}

function renderProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = products.filter(p => {
    const ms = p.name.toLowerCase().includes(search) || (p.model||'').toLowerCase().includes(search);
    const mc = currentCat==='همه' || p.category===currentCat;
    return ms && mc;
  });
  renderCats(); updateStats();
  const list = document.getElementById('productList');
  if(!filtered.length) {
    list.innerHTML = '<div class="empty"><div style="font-size:40px">' + (products.length===0?'📭':'🔍') + '</div><div style="margin-top:8px">' + (products.length===0?'انبار خالیه! با صدا یا تایپ اضافه کن':'چیزی پیدا نشد') + '</div></div>';
    return;
  }
  list.innerHTML = filtered.map(p =>
    '<div class="product-card' + (p.qty<=2?' low':'') + '">' +
    '<div><div class="product-name">' + p.name + (p.model?' <span class="product-model">'+p.model+'</span>':'') + '</div>' +
    '<div class="product-cat">' + (p.category||'متفرقه') + '</div></div>' +
    '<div class="qty-controls">' +
    '<button class="qty-btn" onclick="changeQty(' + p.id + ',-1)">−</button>' +
    '<span class="qty-num' + (p.qty<=2?' low':'') + '">' + p.qty + '</span>' +
    '<button class="qty-btn" onclick="changeQty(' + p.id + ',1)">+</button>' +
    '<button class="del-btn" onclick="delProduct(' + p.id + ')">🗑️</button>' +
    '</div></div>'
  ).join('');
}

function changeQty(id, d) {
  products = products.map(p => p.id===id ? {...p, qty: Math.max(0, p.qty+d)} : p);
  save(); renderProducts();
}

function delProduct(id) {
  const p = products.find(x => x.id===id);
  if(confirm('«' + p.name + '» حذف بشه؟')) { products = products.filter(x => x.id!==id); save(); renderProducts(); }
}

function renderDashboard() {
  const total = products.reduce((s,p) => s+p.qty, 0);
  const low = products.filter(p => p.qty<=2);
  const cats = getCategories().length - 1;
  document.getElementById('dashContent').innerHTML =
    '<div class="stat-card" style="border:1px solid rgba(59,130,246,0.2)"><div style="font-size:24px">📦</div><div class="stat-val" style="color:#3b82f6">' + products.length + '</div><div class="stat-label">کل محصولات</div></div>' +
    '<div class="stat-card" style="border:1px solid rgba(139,92,246,0.2)"><div style="font-size:24px">🔢</div><div class="stat-val" style="color:#8b5cf6">' + total + '</div><div class="stat-label">کل آیتم‌ها</div></div>' +
    '<div class="stat-card" style="border:1px solid rgba(245,158,11,0.2)"><div style="font-size:24px">⚠️</div><div class="stat-val" style="color:#f59e0b">' + low.length + '</div><div class="stat-label">موجودی کم</div></div>' +
    '<div class="stat-card" style="border:1px solid rgba(16,185,129,0.2)"><div style="font-size:24px">🗂️</div><div class="stat-val" style="color:#10b981">' + cats + '</div><div class="stat-label">دسته‌بندی</div></div>' +
    (low.length > 0 ? '<div class="low-list"><div style="color:#f59e0b;margin-bottom:8px">⚠️ موجودی کم</div>' + low.map(p => '<div class="low-item"><span>' + p.name + ' ' + (p.model||'') + '</span><span style="color:#f87171">' + p.qty + ' عدد</span></div>').join('') + '</div>' : '');
}

renderProducts();
</script>
</body>
</html>
